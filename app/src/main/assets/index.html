<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Ball Sort Puzzle</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  body{margin:0;padding:0;overflow:hidden;font-family:'Segoe UI',sans-serif;}
  html,body{width:100%;height:100%;}

  /* Screen transitions */
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s ease,transform 0.4s ease;}
  .screen.hidden{opacity:0;pointer-events:none;transform:scale(0.95);}

  /* Home gradient */
  #homeScreen{background:linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);}
  /* Game gradient */
  #gameScreen{background:linear-gradient(160deg,#0d0d1a 0%,#1a1040 50%,#0a2040 100%);}

  /* Logo glow */
  .logo-glow{text-shadow:0 0 20px rgba(120,80,255,0.8),0 0 40px rgba(60,160,255,0.5);}

  /* Tube */
  .tube{
    position:relative;display:flex;flex-direction:column;align-items:center;
    justify-content:flex-end;
    border:2.5px solid rgba(255,255,255,0.25);
    border-radius:0 0 999px 999px;
    border-top:none;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(4px);
    cursor:pointer;
    transition:transform 0.15s ease,box-shadow 0.15s ease;
    overflow:hidden;
    padding:3px 3px 5px;
    flex-shrink:0;
  }
  .tube.selected{
    transform:translateY(-12px) scale(1.05);
    box-shadow:0 0 24px rgba(120,200,255,0.7),0 0 8px rgba(255,255,255,0.3);
    border-color:rgba(120,200,255,0.9);
  }
  .tube.valid-target{
    box-shadow:0 0 18px rgba(80,255,120,0.6);
    border-color:rgba(80,255,120,0.8);
  }
  .tube.complete{
    box-shadow:0 0 22px rgba(255,200,50,0.8);
    border-color:rgba(255,200,50,0.9);
    animation:completePulse 1s ease infinite alternate;
  }
  @keyframes completePulse{
    from{box-shadow:0 0 12px rgba(255,200,50,0.6);}
    to{box-shadow:0 0 30px rgba(255,200,50,1),0 0 60px rgba(255,150,0,0.5);}
  }

  /* Ball */
  .ball{
    border-radius:50%;
    transition:transform 0.15s ease;
    flex-shrink:0;
    position:relative;
  }
  .ball::after{
    content:'';
    position:absolute;
    top:18%;left:22%;
    width:28%;height:28%;
    border-radius:50%;
    background:rgba(255,255,255,0.45);
    filter:blur(1px);
  }
  .ball-drop{animation:ballDrop 0.28s cubic-bezier(.2,1.5,.5,1);}
  @keyframes ballDrop{
    from{transform:translateY(-40px) scale(0.7);opacity:0.5;}
    to{transform:translateY(0) scale(1);opacity:1;}
  }
  .ball-bounce{animation:ballBounce 0.35s ease;}
  @keyframes ballBounce{
    0%{transform:scale(1);}25%{transform:scale(1.25,0.8);}60%{transform:scale(0.9,1.1);}100%{transform:scale(1);}
  }

  /* Level complete overlay */
  #levelCompleteOverlay{
    position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);
    z-index:100;opacity:0;pointer-events:none;
    transition:opacity 0.4s ease;
  }
  #levelCompleteOverlay.show{opacity:1;pointer-events:all;}

  /* Particle canvas */
  #particleCanvas{position:fixed;inset:0;pointer-events:none;z-index:90;}

  /* Buttons */
  .btn-primary{
    background:linear-gradient(135deg,#7b2ff7,#3a7bd5);
    box-shadow:0 4px 20px rgba(123,47,247,0.5);
    transition:transform 0.12s ease,box-shadow 0.12s ease;
  }
  .btn-primary:active{transform:scale(0.94);box-shadow:0 2px 10px rgba(123,47,247,0.4);}
  .btn-secondary{
    background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.25);
    transition:transform 0.12s ease,background 0.12s ease;
    backdrop-filter:blur(4px);
  }
  .btn-secondary:active{transform:scale(0.94);background:rgba(255,255,255,0.2);}
  .btn-danger{
    background:linear-gradient(135deg,#e74c3c,#c0392b);
    box-shadow:0 4px 14px rgba(231,76,60,0.4);
    transition:transform 0.12s ease;
  }
  .btn-danger:active{transform:scale(0.94);}
  .btn-success{
    background:linear-gradient(135deg,#27ae60,#2ecc71);
    box-shadow:0 4px 14px rgba(46,204,113,0.4);
    transition:transform 0.12s ease;
  }
  .btn-success:active{transform:scale(0.94);}

  /* Settings modal */
  #settingsModal{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);
    z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s ease;
  }
  #settingsModal.show{opacity:1;pointer-events:all;}
  .modal-box{
    background:linear-gradient(160deg,#1e1e3f,#0f2050);
    border:1.5px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:24px;
    width:min(340px,88vw);
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
  }

  /* Toggle switch */
  .toggle{position:relative;display:inline-block;width:48px;height:26px;}
  .toggle input{opacity:0;width:0;height:0;}
  .slider{
    position:absolute;inset:0;background:rgba(255,255,255,0.15);
    border-radius:999px;cursor:pointer;transition:background 0.3s;
  }
  .slider::before{
    content:'';position:absolute;height:20px;width:20px;
    left:3px;bottom:3px;background:white;border-radius:50%;
    transition:transform 0.3s;
  }
  input:checked+.slider{background:linear-gradient(135deg,#7b2ff7,#3a7bd5);}
  input:checked+.slider::before{transform:translateX(22px);}

  /* Scrollable tube area */
  #tubeArea{
    display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:center;
    gap:8px;width:100%;flex:1;
    align-content:center;
    overflow:hidden;
    padding:4px 8px;
  }

  /* Hint flash */
  .hint-flash{animation:hintFlash 0.6s ease 3;}
  @keyframes hintFlash{
    0%,100%{box-shadow:none;}
    50%{box-shadow:0 0 30px rgba(255,220,0,1),0 0 60px rgba(255,180,0,0.7);}
  }

  /* Undo animation */
  .ball-undo{animation:ballUndo 0.3s ease;}
  @keyframes ballUndo{from{transform:scale(1.3) rotate(-20deg);opacity:0.5;}to{transform:scale(1) rotate(0);opacity:1;}}

  /* Star burst */
  .star{position:fixed;pointer-events:none;font-size:24px;animation:starFloat 1.2s ease forwards;z-index:95;}
  @keyframes starFloat{
    0%{transform:translateY(0) scale(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(-120px) scale(1.4) rotate(360deg);opacity:0;}
  }

  /* Progress bar */
  #progressBar{transition:width 0.5s ease;}

  /* Tube top cap */
  .tube-cap{
    position:absolute;top:-3px;left:-2px;right:-2px;height:5px;
    border-radius:3px 3px 0 0;
    background:rgba(255,255,255,0.15);
    display:none;
  }

  /* Mobile safe area */
  #gameScreen{padding-bottom:env(safe-area-inset-bottom,0px);}

  /* Score badge */
  .score-badge{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:12px;
    padding:6px 14px;
    backdrop-filter:blur(4px);
  }
</style>
</head>
<body class="w-screen h-screen overflow-hidden">

<canvas id="particleCanvas"></canvas>

<!-- HOME SCREEN -->
<div id="homeScreen" class="screen">
  <div class="flex flex-col items-center gap-6 px-8 w-full max-w-sm">
    <!-- Logo -->
    <div class="flex flex-col items-center gap-2 mb-2">
      <div class="text-6xl mb-1">🎨</div>
      <h1 class="logo-glow text-4xl font-black text-white tracking-wider">Ball Sort</h1>
      <p class="text-purple-300 text-sm font-medium tracking-widest uppercase">Puzzle</p>
    </div>
    <!-- Decorative tubes preview -->
    <div class="flex gap-3 justify-center mb-2" id="previewTubes"></div>
    <!-- Buttons -->

<div id="levelCompleteOverlay">

    <div class="text-6xl" id="completeEmoji">🎉</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal">
  <div class="modal-box">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-white text-xl font-black">Settings</h2>
      <button id="closeSettings" class="text-white/60 text-2xl leading-none hover:text-white">✕</button>

    <div class="flex flex-col gap-4">
      <div class="flex items-center justify-between">
        <span class="text-white font-medium">Sound Effects</span>

      </div>
      <div class="flex items-center justify-between">
        <span class="text-white font-medium">Animations</span>
        <label class="toggle"><input type="checkbox" id="animToggle" checked/><span class="slider"></span></label>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-white font-medium">Particles</span>
        <label class="toggle"><input type="checkbox" id="particleToggle" checked/><span class="slider"></span></label>
      </div>
      <div class="border-t border-white/10 pt-4 flex flex-col gap-2">
        <button id="resetProgressBtn" class="btn-danger rounded-xl py-2.5 text-white text-sm font-semibold">Reset Progress</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIGURATION
   ============================================================ */
const LEVEL_CONFIG = [
  {tubes:3, colors:2, ballsPerColor:3},   // L1  → 6 balls, 3 tubes (1 empty)
  {tubes:4, colors:2, ballsPerColor:4},   // L2  → 8 balls, 4 tubes (2 empty)
  {tubes:4, colors:3, ballsPerColor:4},   // L3  → 12 balls, 4 tubes (0 empty → +1 empty)
  {tubes:5, colors:3, ballsPerColor:5},   // L4  → 15 balls, 5 tubes (2 empty)
  {tubes:5, colors:4, ballsPerColor:5},   // L5  → 20 balls, 5 tubes (0 empty → +1)
  {tubes:6, colors:4, ballsPerColor:6},   // L6  → 24 balls, 6 tubes (2 empty)
  {tubes:6, colors:5, ballsPerColor:5},   // L7  → 25 balls, 6 tubes (1 empty)
  {tubes:6, colors:5, ballsPerColor:6},   // L8  → 30 balls, 6 tubes (0 empty → +1)
  {tubes:7, colors:5, ballsPerColor:7},   // L9  → 35 balls, 7 tubes (2 empty)
  {tubes:7, colors:6, ballsPerColor:6},   // L10 → 36 balls, 7 tubes (1 empty)
  {tubes:7, colors:6, ballsPerColor:7},   // L11 → 42 balls, 7 tubes (0 empty → +1)
  {tubes:8, colors:6, ballsPerColor:8},   // L12 → 48 balls, 8 tubes (2 empty)
  {tubes:8, colors:7, ballsPerColor:7},   // L13 → 49 balls, 8 tubes (1 empty)
  {tubes:8, colors:7, ballsPerColor:8},   // L14 → 56 balls, 8 tubes (0 empty → +1)
  {tubes:8, colors:8, ballsPerColor:8},   // L15 → 64 balls, 8 tubes (0 empty → +1)
];

const TOTAL_LEVELS = LEVEL_CONFIG.length;

const BALL_COLORS = [
  {bg:'#e74c3c',glow:'rgba(231,76,60,0.7)',name:'Red'},
  {bg:'#3498db',glow:'rgba(52,152,219,0.7)',name:'Blue'},
  {bg:'#2ecc71',glow:'rgba(46,204,113,0.7)',name:'Green'},
  {bg:'#f39c12',glow:'rgba(243,156,18,0.7)',name:'Orange'},
  {bg:'#9b59b6',glow:'rgba(155,89,182,0.7)',name:'Purple'},
  {bg:'#1abc9c',glow:'rgba(26,188,156,0.7)',name:'Teal'},
  {bg:'#e91e63',glow:'rgba(233,30,99,0.7)',name:'Pink'},
  {bg:'#ff5722',glow:'rgba(255,87,34,0.7)',name:'Deep Orange'},
  {bg:'#cddc39',glow:'rgba(205,220,57,0.7)',name:'Lime'},
  {bg:'#00bcd4',glow:'rgba(0,188,212,0.7)',name:'Cyan'},
];

/* ============================================================
   STATE
   ============================================================ */
let state = {
  currentLevel: 0,
  tubes: [],
  selectedTube: -1,
  moves: 0,
  score: 0,
  startTime: null,
  timerInterval: null,
  history: [],
  initialTubes: [],
  levelColors: [],
  ballsPerColor: 4,
  solved: false,
  soundEnabled: true,
  animEnabled: true,
  particleEnabled: true,
};

/* ============================================================
   AUDIO (Web Audio API - no external files needed)
   ============================================================ */
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type){
  if(!state.soundEnabled) return;
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if(type==='pick'){osc.frequency.value=600;osc.type='sine';gain.gain.setValueAtTime(0.15,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);}
    else if(type==='drop'){osc.frequency.value=400;osc.type='sine';gain.gain.setValueAtTime(0.2,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);}
    else if(type==='invalid'){osc.frequency.value=180;osc.type='square';gain.gain.setValueAtTime(0.1,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.18);}
    else if(type==='complete'){
      [523,659,784,1047].forEach((f,i)=>{
        const o2=ctx.createOscillator();const g2=ctx.createGain();
        o2.connect(g2);g2.connect(ctx.destination);
        o2.frequency.value=f;o2.type='sine';
        const t=ctx.currentTime+i*0.12;
        g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(0.18,t+0.05);
        g2.gain.exponentialRampToValueAtTime(0.001,t+0.3);
        o2.start(t);o2.stop(t+0.35);
      });return;
    }
    else if(type==='win'){
      [523,659,784,1047,1319].forEach((f,i)=>{
        const o2=ctx.createOscillator();const g2=ctx.createGain();
        o2.connect(g2);g2.connect(ctx.destination);
        o2.frequency.value=f;o2.type='sine';
        const t=ctx.currentTime+i*0.1;
        g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(0.2,t+0.05);
        g2.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        o2.start(t);o2.stop(t+0.45);
      });return;
    }
    osc.start(); osc.stop(ctx.currentTime+0.3);
  }catch(e){}
}

/* ============================================================
   PARTICLE SYSTEM
   ============================================================ */
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];
function resizeParticleCanvas(){
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeParticleCanvas();
window.addEventListener('resize', resizeParticleCanvas);

function spawnParticles(x, y, color, count=18){
  if(!state.particleEnabled) return;
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 2 + Math.random()*5;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed - 2,
      color,
      alpha:1,
      size:4+Math.random()*6,
      life:0.8+Math.random()*0.6,
      decay:0.02+Math.random()*0.02,
    });
  }
}
function animateParticles(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles = particles.filter(p=>p.alpha>0.01);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15;
    p.alpha-=p.decay;
    pCtx.save();
    pCtx.globalAlpha=p.alpha;
    pCtx.fillStyle=p.color;
    pCtx.beginPath();
    pCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
    pCtx.fill();
    pCtx.restore();
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

/* ============================================================
   LEVEL GENERATION
   ============================================================ */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function generateLevel(levelIdx){
  const cfg = LEVEL_CONFIG[levelIdx];
  const {colors, ballsPerColor} = cfg;
  let totalBalls = colors * ballsPerColor;
  
  // Calculate tubes: enough for all balls + at least 1-2 empty
  let tubeCount = cfg.tubes;
  let tubeCapacity = ballsPerColor;
  
  // Ensure we have enough empty tubes
  let occupiedTubes = Math.ceil(totalBalls / tubeCapacity);
  if(occupiedTubes >= tubeCount) tubeCount = occupiedTubes + 1;

  // Pick colors
  const shuffledColors = shuffle([...BALL_COLORS]).slice(0, colors);
  state.levelColors = shuffledColors;
  state.ballsPerColor = ballsPerColor;

  // Build ball pool
  let ballPool = [];
  for(let c=0;c<colors;c++){
    for(let b=0;b<ballsPerColor;b++) ballPool.push(c);
  }
  shuffle(ballPool);

  // Fill tubes
  let tubes = [];
  let idx = 0;
  for(let t=0;t<tubeCount;t++){
    const balls = [];
    while(balls.length < tubeCapacity && idx < ballPool.length){
      balls.push(ballPool[idx++]);
    }
    tubes.push(balls);
  }
  // Remaining balls if any → keep shuffling into existing
  while(idx < ballPool.length){
    const t = Math.floor(Math.random()*occupiedTubes);
    if(tubes[t].length < tubeCapacity) tubes[t].push(ballPool[idx++]);
  }
  // Add empty tubes to reach tubeCount
  while(tubes.length < tubeCount) tubes.push([]);

  // Ensure puzzle is not already solved
  if(isSolved(tubes, tubeCapacity, colors)){
    return generateLevel(levelIdx);
  }

  return {tubes, tubeCapacity, tubeCount, colors};
}

function isSolved(tubes, tubeCapacity, colors){
  let solvedColors = 0;
  for(const tube of tubes){
    if(tube.length === 0) continue;
    if(tube.length !== tubeCapacity) return false;
    const c = tube[0];
    for(const b of tube) if(b!==c) return false;
    solvedColors++;
  }
  return solvedColors === colors;
}

/* ============================================================
   RENDER
   ============================================================ */
function getTubeDimensions(){
  const W = window.innerWidth;
  const H = window.innerHeight;
  const tubeCount = state.tubes.length;
  const ballsPerColor = state.ballsPerColor;

  // Available area
  const topBarH = 120;
  const bottomBarH = 68;
  const statsH = 52;
  const progressH = 20;
  const availH = H - topBarH - bottomBarH - statsH - progressH - 24;
  const availW = Math.min(W - 16, 700);

  // Max columns
  const cols = tubeCount <= 5 ? tubeCount : tubeCount <= 8 ? Math.ceil(tubeCount/2) : Math.ceil(tubeCount/3);
  const rows = Math.ceil(tubeCount / cols);

  // Ball size
  const maxBallByW = Math.floor((availW / cols) * 0.72);
  const maxBallByH = Math.floor((availH / rows - 16) / (ballsPerColor + 0.5));
  let ballSize = Math.min(maxBallByW, maxBallByH, 48, Math.max(20, Math.floor(availW / (cols * 1.6))));
  ballSize = Math.max(ballSize, 18);

  const tubeW = ballSize + 10;
  const tubeH = ballsPerColor * (ballSize + 3) + 10;

  return {ballSize, tubeW, tubeH, cols};
}

function renderTubes(){
  const area = document.getElementById('tubeArea');
  area.innerHTML = '';
  const {ballSize, tubeW, tubeH} = getTubeDimensions();
  const gap = Math.min(12, Math.max(5, Math.floor(window.innerWidth / state.tubes.length / 4)));

  area.style.gap = gap+'px';

  state.tubes.forEach((tube, ti) => {
    const tubeEl = document.createElement('div');
    tubeEl.className = 'tube';
    tubeEl.dataset.idx = ti;
    tubeEl.style.width = tubeW+'px';
    tubeEl.style.height = tubeH+'px';
    tubeEl.style.minHeight = tubeH+'px';

    if(ti === state.selectedTube) tubeEl.classList.add('selected');
    if(isValidTarget(ti)) tubeEl.classList.add('valid-target');
    if(isTubeComplete(tube)) tubeEl.classList.add('complete');

    // Render balls (bottom to top → reverse for flex-col end)
    const ballsCopy = [...tube].reverse();
    for(let bi=0;bi<state.ballsPerColor;bi++){
      const slot = document.createElement('div');
      slot.style.width = ballSize+'px';
      slot.style.height = ballSize+'px';
      slot.style.flexShrink = '0';
      slot.style.margin = '1.5px 0';
      if(bi < ballsCopy.length){
        const colorIdx = ballsCopy[bi];
        const col = state.levelColors[colorIdx];
        slot.className = 'ball';
        slot.style.width = ballSize+'px';
        slot.style.height = ballSize+'px';
        slot.style.background = `radial-gradient(circle at 35% 35%, ${lighten(col.bg,40)}, ${col.bg} 60%, ${darken(col.bg,30)})`;
        slot.style.boxShadow = `0 2px 8px ${col.glow}, inset 0 -2px 4px rgba(0,0,0,0.3)`;
        slot.style.border = `1.5px solid rgba(255,255,255,0.2)`;
      } else {
        slot.style.background = 'transparent';
        slot.style.borderRadius = '50%';
      }
      tubeEl.appendChild(slot);
    }

    area.appendChild(tubeEl);
  });
}

function isTubeComplete(tube){
  if(tube.length !== state.ballsPerColor) return false;
  const c = tube[0];
  return tube.every(b=>b===c);
}

function isValidTarget(ti){
  if(state.selectedTube === -1 || state.selectedTube === ti) return false;
  return canMove(state.selectedTube, ti);
}

function canMove(from, to){
  if(from === to) return false;
  const fromTube = state.tubes[from];
  const toTube = state.tubes[to];
  if(fromTube.length === 0) return false;
  if(toTube.length >= state.ballsPerColor) return false;
  if(toTube.length === 0) return true;
  return fromTube[fromTube.length-1] === toTube[toTube.length-1];
}

function lighten(hex, amt){
  return adjustColor(hex, amt);
}
function darken(hex, amt){
  return adjustColor(hex, -amt);
}
function adjustColor(hex, amt){
  const c = hex.replace('#','');
  const r = Math.max(0,Math.min(255,parseInt(c.slice(0,2),16)+amt));
  const g = Math.max(0,Math.min(255,parseInt(c.slice(2,4),16)+amt));
  const b = Math.max(0,Math.min(255,parseInt(c.slice(4,6),16)+amt));
  return `rgb(${r},${g},${b})`;
}

/* ============================================================
   TUBE AREA DELEGATED EVENT LISTENER (set up once)
   ============================================================ */
(function setupTubeEvents(){
  const area = document.getElementById('tubeArea');
  let lastTouch = 0;
  let processing = false;

  function handleInteraction(e){
    if(processing) return;
    const tubeEl = e.target.closest('[data-idx]');
    if(!tubeEl) return;
    const ti = parseInt(tubeEl.dataset.idx);
    processing = true;
    onTubeClick(ti);
    processing = false;
  }

  area.addEventListener('touchend', (e)=>{
    e.preventDefault();
    lastTouch = Date.now();
    handleInteraction(e);
  },{passive:false});

  area.addEventListener('click', (e)=>{
    if(Date.now() - lastTouch < 600) return;
    handleInteraction(e);
  });
})();

/* ============================================================
   GAME LOGIC
   ============================================================ */
function onTubeClick(ti){
  if(state.solved) return;
  const tube = state.tubes[ti];

  if(state.selectedTube === -1){
    if(tube.length === 0) return;
    if(isTubeComplete(tube)) return;
    state.selectedTube = ti;
    playSound('pick');
    renderTubes();
    return;
  }

  if(state.selectedTube === ti){
    state.selectedTube = -1;
    renderTubes();
    return;
  }

  if(!canMove(state.selectedTube, ti)){
    playSound('invalid');
    // shake invalid
    const tubeEl = document.querySelector(`[data-idx="${ti}"]`);
    if(tubeEl){
      tubeEl.style.animation = 'none';
      tubeEl.offsetHeight;
      tubeEl.style.animation = 'shake 0.3s ease';
    }
    state.selectedTube = -1;
    renderTubes();
    return;
  }

  // Perform move
  saveHistory();
  const ball = state.tubes[state.selectedTube].pop();
  state.tubes[ti].push(ball);
  state.moves++;
  state.selectedTube = -1;
  playSound('drop');
  renderTubes();
  updateStats();

  // Spawn particles on drop
  const tubeEl = document.querySelector(`[data-idx="${ti}"]`);
  if(tubeEl){
    const rect = tubeEl.getBoundingClientRect();
    const col = state.levelColors[ball];
    spawnParticles(rect.left+rect.width/2, rect.top+20, col.bg, 10);
    // animate top ball
    const balls = tubeEl.querySelectorAll('.ball');
    if(balls.length>0 && state.animEnabled){
      balls[0].classList.add('ball-drop');
      setTimeout(()=>balls[0].classList.remove('ball-drop'),400);
    }
  }

  // Check win
  if(isSolved(state.tubes, state.ballsPerColor, state.levelColors.length)){
    setTimeout(()=>showLevelComplete(), 500);
  }
}

function saveHistory(){
  state.history.push({
    tubes: state.tubes.map(t=>[...t]),
    moves: state.moves,
  });
  if(state.history.length > 100) state.history.shift();
}

function undoMove(){
  if(state.history.length === 0) return;
  const prev = state.history.pop();
  state.tubes = prev.tubes;
  state.moves = prev.moves;
  state.selectedTube = -1;
  updateStats();
  renderTubes();
  if(state.animEnabled){
    document.querySelectorAll('.ball').forEach(b=>{
      b.classList.add('ball-undo');
      setTimeout(()=>b.classList.remove('ball-undo'),350);
    });
  }
}

/* ============================================================
   HINTS
   ============================================================ */
function findHint(){
  const tubes = state.tubes;
  // Prefer: top ball matches target top ball, or target is empty and source has multiple colors
  for(let from=0;from<tubes.length;from++){
    for(let to=0;to<tubes.length;to++){
      if(!canMove(from,to)) continue;
      // Priority: don't move to empty unless source is all same color
      const fromTop = tubes[from][tubes[from].length-1];
      const toTop = tubes[to].length>0 ? tubes[to][tubes[to].length-1] : null;
      if(toTop !== null && fromTop === toTop) return {from,to};
    }
  }
  // Fall back: any valid move
  for(let from=0;from<tubes.length;from++){
    for(let to=0;to<tubes.length;to++){
      if(canMove(from,to)) return {from,to};
    }
  }
  return null;
}

function showHint(){
  const hint = findHint();
  if(!hint) return;
  const fromEl = document.querySelector(`[data-idx="${hint.from}"]`);
  const toEl = document.querySelector(`[data-idx="${hint.to}"]`);
  [fromEl, toEl].forEach(el=>{
    if(!el) return;
    el.classList.add('hint-flash');
    setTimeout(()=>el.classList.remove('hint-flash'),2000);
  });
}

/* ============================================================
   TIMER & STATS
   ============================================================ */
function startTimer(){
  state.startTime = Date.now();
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(updateTimer, 1000);
}
function stopTimer(){
  clearInterval(state.timerInterval);
  state.timerInterval = null;
}
function updateTimer(){
  if(!state.startTime) return;
  const elapsed = Math.floor((Date.now()-state.startTime)/1000);
  const m = Math.floor(elapsed/60);
  const s = elapsed%60;
  document.getElementById('timeNum').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}
function updateStats(){
  document.getElementById('movesNum').textContent = state.moves;
  document.getElementById('scoreNum').textContent = computeScore();
  document.getElementById('progressBar').style.width = ((state.currentLevel)/TOTAL_LEVELS*100)+'%';
}
function computeScore(){
  if(!state.startTime) return 0;
  const elapsed = Math.floor((Date.now()-state.startTime)/1000);
  const base = (state.currentLevel+1)*1000;
  const timePenalty = elapsed * 2;
  const movePenalty = state.moves * 5;
  return Math.max(0, base - timePenalty - movePenalty + state.score);
}

/* ============================================================
   LEVEL COMPLETE
   ============================================================ */
function showLevelComplete(){
  state.solved = true;
  stopTimer();
  playSound('complete');
  document.getElementById('nextBtn').style.display = 'block';
  
  const overlay = document.getElementById('levelCompleteOverlay');
  const elapsed = Math.floor((Date.now()-state.startTime)/1000);
  const m = Math.floor(elapsed/60);
  const s = elapsed%60;
  const isLast = state.currentLevel >= TOTAL_LEVELS-1;
  
  document.getElementById('completeSummary').innerHTML =
    `Moves: <b class="text-white">${state.moves}</b> &nbsp;|&nbsp; Time: <b class="text-white">${m}:${s.toString().padStart(2,'0')}</b><br>Score: <b class="text-yellow-400 text-lg">${computeScore()}</b>`;
  document.getElementById('completeEmoji').textContent = isLast ? '🏆' : '🎉';
  document.getElementById('continueBtn').textContent = isLast ? 'Play Again 🔄' : 'Continue →';
  
  overlay.classList.add('show');
  
  // Particle burst from center
  const cx = window.innerWidth/2;
  const cy = window.innerHeight/2;
  for(const col of state.levelColors){
    spawnParticles(cx + (Math.random()-0.5)*100, cy + (Math.random()-0.5)*100, col.bg, 20);
  }

  // Stars
  spawnStars();
}

function spawnStars(){
  const emojis = ['⭐','✨','🌟','💫'];
  for(let i=0;i<8;i++){
    setTimeout(()=>{
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      s.style.left = (10+Math.random()*80)+'vw';
      s.style.top = (30+Math.random()*40)+'vh';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(), 1300);
    }, i*120);
  }
}

/* ============================================================
   SCREEN MANAGEMENT
   ============================================================ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{
    if(s.id===id) s.classList.remove('hidden');
    else s.classList.add('hidden');
  });
}

function loadLevel(idx){
  const overlay = document.getElementById('levelCompleteOverlay');
  overlay.classList.remove('show');
  state.currentLevel = idx;
  state.selectedTube = -1;
  state.moves = 0;
  state.history = [];
  state.solved = false;

  const {tubes, tubeCapacity, tubeCount, colors} = generateLevel(idx);
  state.tubes = tubes;
  state.initialTubes = tubes.map(t => [...t]);
  state.ballsPerColor = tubeCapacity;

  document.getElementById('levelNum').textContent = idx+1;
  document.getElementById('nextBtn').style.display = 'none';
  startTimer();
  updateStats();
  renderTubes();
}

function startGame(){
  showScreen('gameScreen');
  const savedLevel = parseInt(localStorage.getItem('bsp_level')||'0');
  const lvl = Math.min(savedLevel, TOTAL_LEVELS-1);
  state.score = parseInt(localStorage.getItem('bsp_score')||'0');
  loadLevel(lvl);
}

/* ============================================================
   HOME SCREEN PREVIEW
   ============================================================ */
function renderPreviewTubes(){
  const container = document.getElementById('previewTubes');
  container.innerHTML='';
  const previewColors = shuffle([...BALL_COLORS]).slice(0,3);
  const tubeDefs = [[0,1,2],[1,0,2],[2,1,0],[]];
  tubeDefs.forEach(balls=>{
    const t = document.createElement('div');
    t.className='tube';
    t.style.width='32px';t.style.height='96px';
    balls.slice().reverse().forEach(ci=>{
      const b=document.createElement('div');
      b.className='ball';
      b.style.width='24px';b.style.height='24px';b.style.margin='1px 0';
      const col=previewColors[ci];
      b.style.background=`radial-gradient(circle at 35% 35%, ${lighten(col.bg,40)}, ${col.bg} 60%, ${darken(col.bg,30)})`;
      b.style.boxShadow=`0 2px 6px ${col.glow}`;
      b.style.border='1px solid rgba(255,255,255,0.2)';
      t.appendChild(b);
    });
    container.appendChild(t);
  });
}

/* ============================================================
   EVENT LISTENERS
   ============================================================ */
document.getElementById('playBtn').addEventListener('click',()=>{
  playSound('pick');
  startGame();
});

document.getElementById('homeSettingsBtn').addEventListener('click',()=>openSettings());
document.getElementById('gameSettingsBtn').addEventListener('click',()=>openSettings());
document.getElementById('closeSettings').addEventListener('click',()=>closeSettings());
document.getElementById('settingsModal').addEventListener('click',(e)=>{
  if(e.target===document.getElementById('settingsModal')) closeSettings();
});

document.getElementById('undoBtn').addEventListener('click',()=>{
  playSound('pick');
  undoMove();
});
document.getElementById('restartBtn').addEventListener('click',()=>{
  playSound('invalid');
  document.getElementById('levelCompleteOverlay').classList.remove('show');
  state.tubes = state.initialTubes.map(t => [...t]);
  state.selectedTube = -1;
  state.moves = 0;
  state.history = [];
  state.solved = false;
  document.getElementById('nextBtn').style.display = 'none';
  startTimer();
  updateStats();
  renderTubes();
});
document.getElementById('hintBtn').addEventListener('click',()=>showHint());
document.getElementById('nextBtn').addEventListener('click',()=>{
  playSound('pick');
  const next = (state.currentLevel+1)%TOTAL_LEVELS;
  loadLevel(next);
});

document.getElementById('continueBtn').addEventListener('click',()=>{
  playSound('pick');
  const isLast = state.currentLevel >= TOTAL_LEVELS-1;
  localStorage.setItem('bsp_score', state.score + computeScore());
  if(isLast){
    localStorage.setItem('bsp_level','0');
    state.score=0;
    loadLevel(0);
  } else {
    const next = state.currentLevel+1;
    localStorage.setItem('bsp_level',next);
    loadLevel(next);
  }
});

document.getElementById('replayBtn').addEventListener('click',()=>{
  playSound('pick');
  loadLevel(state.currentLevel);
});

document.getElementById('backBtn').addEventListener('click',()=>{
  stopTimer();
  document.getElementById('levelCompleteOverlay').classList.remove('show');
  showScreen('homeScreen');
});

document.getElementById('soundToggle').addEventListener('change',e=>{
  state.soundEnabled=e.target.checked;
  localStorage.setItem('bsp_sound',e.target.checked?'1':'0');
});
document.getElementById('animToggle').addEventListener('change',e=>{
  state.animEnabled=e.target.checked;
  localStorage.setItem('bsp_anim',e.target.checked?'1':'0');
});
document.getElementById('particleToggle').addEventListener('change',e=>{
  state.particleEnabled=e.target.checked;
  localStorage.setItem('bsp_particle',e.target.checked?'1':'0');
});
document.getElementById('resetProgressBtn').addEventListener('click',()=>{
  localStorage.removeItem('bsp_level');
  localStorage.removeItem('bsp_score');
  state.score=0;
  closeSettings();
  if(!document.getElementById('gameScreen').classList.contains('hidden')) loadLevel(0);
});

function openSettings(){
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings(){
  document.getElementById('settingsModal').classList.remove('show');
}

/* ============================================================
   RESPONSIVE RESIZE
   ============================================================ */
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    if(!document.getElementById('gameScreen').classList.contains('hidden')) renderTubes();
  },120);
});

/* ============================================================
   CSS SHAKE (injected)
   ============================================================ */
const shakeStyle = document.createElement('style');
shakeStyle.textContent=`@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}`;
document.head.appendChild(shakeStyle);

/* ============================================================
   SETTINGS INIT
   ============================================================ */
function initSettings(){
  const s=localStorage.getItem('bsp_sound');
  const a=localStorage.getItem('bsp_anim');
  const p=localStorage.getItem('bsp_particle');
  if(s!==null){state.soundEnabled=s==='1';document.getElementById('soundToggle').checked=s==='1';}
  if(a!==null){state.animEnabled=a==='1';document.getElementById('animToggle').checked=a==='1';}
  if(p!==null){state.particleEnabled=p==='1';document.getElementById('particleToggle').checked=p==='1';}
}

/* ============================================================
   INIT
   ============================================================ */
initSettings();
renderPreviewTubes();
showScreen('homeScreen');
</script>
